<div class="input-group-custom">
  <label>{{ label }}</label>

  <div class="input-wrapper" [class.textarea-wrapper]="textarea" [class.is-invalid]="invalid">
    <i [class]="icon" aria-hidden="true"></i>

    <ng-container *ngIf="!textarea; else textareaTpl">
      <input
        [attr.type]="resolvedType"
        [attr.name]="name"
        [attr.placeholder]="placeholder"
        [disabled]="isDisabled"
        [value]="value"
        (input)="handleInput(($any($event.target)).value)"
        (blur)="handleBlur()"
      />

      <button
        *ngIf="type === 'password' && showPasswordToggle"
        class="password-toggle"
        type="button"
        [disabled]="isDisabled"
        [attr.aria-label]="isPasswordVisible ? 'Ocultar senha' : 'Mostrar senha'"
        (click)="togglePasswordVisibility()"
      >
        <i
          class="bi"
          [ngClass]="isPasswordVisible ? 'bi-eye-slash' : 'bi-eye'"
          aria-hidden="true"
        ></i>
      </button>
    </ng-container>

    <ng-template #textareaTpl>
      <textarea
        [attr.name]="name"
        [attr.rows]="rows"
        [attr.placeholder]="placeholder"
        [disabled]="isDisabled"
        [value]="value"
        (input)="handleInput(($any($event.target)).value)"
        (blur)="handleBlur()"
      ></textarea>
    </ng-template>
  </div>
</div>
