<section class="group-view-card" aria-label="Grupos">
  <header class="group-view-card__header">
    <h4>Grupos</h4>

    <div class="group-view-card__header-action">
      <app-submit-button label="Novo Grupo" icon="bi bi-plus-circle-fill" type="button"></app-submit-button>
    </div>
  </header>

  <div class="group-view-card__body">
    <ng-container *ngIf="hasItems; else emptyState">
      <ng-content></ng-content>
    </ng-container>

    <ng-template #emptyState>
      <p class="group-view-card__empty">{{ emptyMessage }}</p>
    </ng-template>
  </div>
</section>
