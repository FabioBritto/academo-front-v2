<section class="group-view-card" aria-label="Grupos">
  <header class="group-view-card__header">
    <h4>Grupos</h4>

    <div class="group-view-card__header-action">
      <app-submit-button
        label="Novo Grupo"
        icon="bi bi-plus-circle-fill"
        type="button"
        (click)="openNewGroupModal()"
      ></app-submit-button>
    </div>
  </header>

  <div class="group-view-card__body">
    <ng-container *ngIf="hasItems; else emptyState">
      <div class="group-view-card__list">
        <app-view-group-card *ngFor="let group of groups" [group]="group"></app-view-group-card>
      </div>

      <app-pagination-controls
        *ngIf="totalPages > 1"
        [page]="page"
        [totalPages]="totalPages"
        (pageChange)="onPageChange($event)"
      ></app-pagination-controls>
    </ng-container>

    <ng-template #emptyState>
      <p class="group-view-card__empty">{{ emptyMessage }}</p>
    </ng-template>
  </div>
</section>
